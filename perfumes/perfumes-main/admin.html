<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCA | Admin Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        h1 { margin: 0; color: #dfb76c; }
        .login-box { max-width: 400px; margin: 100px auto; background: #1e1e1e; padding: 30px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .admin-input { width: 100%; padding: 10px; margin: 15px 0; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        .admin-btn { width: 100%; padding: 12px; background: #dfb76c; border: none; color: #121212; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .admin-btn:hover { background: #c59f5a; }
        .orders-container { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .order-card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 20px; position: relative; }
        .order-header { display: flex; justify-content: space-between; color: #aaa; font-size: 0.9em; margin-bottom: 10px; border-bottom: 1px solid #2d2d2d; padding-bottom: 8px; align-items: center; }
        .customer-name { color: #dfb76c; font-size: 1.2em; margin: 0 0 5px 0; }
        .items-list { background: #2d2d2d; padding: 10px; border-radius: 4px; list-style: none; margin: 10px 0; }
        .items-list li { padding: 5px 0; border-bottom: 1px solid #3d3d3d; }
        .items-list li:last-child { border: none; }
        .total-price { font-size: 1.1em; font-weight: bold; color: #dfb76c; margin-bottom: 15px; }
        .delete-btn { background: #ff4444; border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; box-sizing: border-box; }
        .delete-btn:hover { background: #cc3333; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div id="loginSection" class="login-box">
        <h2>🔒 Admin Access</h2>
        <p style="color: #888;">Enter password to view orders</p>
        <input type="password" id="adminPassword" placeholder="Enter Password" class="admin-input">
        <button onclick="checkPassword()" class="admin-btn">Login</button>
    </div>

    <!-- لوحة التحكم -->
    <div id="adminContent" class="hidden">
        <header>
            <h1>ESCA Orders Management</h1>
            <button onclick="logout()" style="background: #555; border:none; color:#fff; padding: 8px 15px; border-radius:4px; cursor:pointer;">Logout</button>
        </header>

        <div class="orders-container" id="ordersList">
            <p id="loadingText">Loading orders from Firebase...</p>
        </div>
    </div>

    <!-- استدعاء فايربيز -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxBPD-orqHQqcExpM0kJfXnNjss--DFhM",
            authDomain: "esca-d3e5d.firebaseapp.com",
            projectId: "esca-d3e5d",
            storageBucket: "esca-d3e5d.firebasestorage.app",
            messagingSenderId: "375569449165",
            appId: "1:375569449165:web:48f9afd018ecf5d6ca2984",
            measurementId: "G-6FMXDCWFWV"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ADMIN_PASSWORD = "Esca2026";

        function checkPassword() {
            const enteredPass = document.getElementById("adminPassword").value;
            if (enteredPass === ADMIN_PASSWORD) {
                document.getElementById("loginSection").classList.add("hidden");
                document.getElementById("adminContent").classList.remove("hidden");
                loadOrders();
            } else {
                alert("❌ Wrong password! Access denied.");
            }
        }

        function loadOrders() {
            const ordersList = document.getElementById("ordersList");
            
            db.collection("orders").onSnapshot((snapshot) => {
                ordersList.innerHTML = "";
                
                if (snapshot.empty) {
                    ordersList.innerHTML = "<p style='text-align:center; color:#aaa;'>✨ No orders found yet.</p>";
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const orderId = doc.id;
                    
                    const orderDate = data.createdAt ? data.createdAt.toDate().toLocaleString('en-US') : "Just now";

                    let itemsHTML = "";
                    if (data.cartItems && Array.isArray(data.cartItems)) {
                        data.cartItems.forEach(item => {
                            itemsHTML += `<li>📦 ${item.name} (${item.size}) — ${item.quantity} x ${item.price} L.E</li>`;
                        });
                    }

                    const card = document.createElement("div");
                    card.className = "order-card";
                    card.innerHTML = `
                        <div class="order-header">
                            <span>ID: ${orderId}</span>
                            <span>📅 ${orderDate}</span>
                        </div>
                        <h3 class="customer-name">👤 ${data.customerName}</h3>
                        <p><strong>📞 Phone:</strong> <a href="tel:${data.customerPhone}" style="color:#dfb76c;">${data.customerPhone}</a></p>
                        <p><strong>📍 Address:</strong> ${data.customerAddress}</p>
                        
                        <h4>🛒 Ordered Items:</h4>
                        <ul class="items-list">${itemsHTML}</ul>
                        
                        <div class="total-price">💰 Total: ${data.totalPrice} L.E</div>
                        <button class="delete-btn" onclick="deleteOrder('${orderId}')">❌ Complete & Delete Order</button>
                    `;
                    ordersList.appendChild(card);
                });
            }, (error) => {
                console.error("Error fetching orders: ", error);
                ordersList.innerHTML = "<p style='color:red;'>⚠️ Access Denied. Make sure Firestore rules are set properly.</p>";
            });
        }

        // دالة حذف الأوردر من الفايربيز
        function deleteOrder(orderId) {
            if (confirm("Are you sure you want to delete this order?")) {
                db.collection("orders").doc(orderId).delete()
                .then(() => {
                    alert("🗑️ Order deleted successfully!");
                })
                .catch((error) => {
                    console.error("Error deleting order: ", error);
                    alert("⚠️ Error deleting order. Check Firebase Rules.");
                });
            }
        }

        function logout() {
            document.getElementById("adminPassword").value = "";
            document.getElementById("loginSection").classList.remove("hidden");
            document.getElementById("adminContent").classList.add("hidden");
        }
    </script>
</body>
</html>
